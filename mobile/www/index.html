<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snippet</title>
    <style>
      html, body { height: 100%; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        background: #0b0611;
        color: #f4eef9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        padding: 18px 16px;
        background: rgba(255,255,255,0.04);
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { margin: 0; line-height: 1.45; color: rgba(244,238,249,0.8); }
      code { color: rgba(244,238,249,0.95); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Snippet (Capacitor)</h1>
      <p>
        This placeholder exists so <code>npx cap sync</code> has a <code>webDir</code> with an
        <code>index.html</code>.
      </p>
      <p style="margin-top: 10px;">
        For development, configure <code>server.url</code> in <code>mobile/capacitor.config.ts</code>
        to point at your Mac’s dev server (LAN IP).
      </p>
    </div>
  </body>
</html>
